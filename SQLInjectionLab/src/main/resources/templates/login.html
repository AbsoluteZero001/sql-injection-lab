<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .system-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .system-info p {
            color: #1565c0;
            font-size: 13px;
            line-height: 1.6;
        }

        .error-message {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .error-message p {
            color: #721c24;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <h1>文章管理系统</h1>
            <p>专业的内容管理平台</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div th:if="${error != null}" class="error-message">
                <p th:text="${error}"></p>
            </div>

            <button type="submit" class="btn-submit">登 录</button>
        </form>

        <div style="text-align: center; margin: 20px 0;">
            <p>还没有账号？ <a href="#" id="register-link">立即注册</a></p>
        </div>

        <div id="register-form" style="display: none; margin-top: 30px; padding-top: 30px; border-top: 1px solid #e1e1e1;">
            <h3 style="color: #333; margin-bottom: 20px; text-align: center;">用户注册</h3>
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="reg-username">用户名</label>
                    <input type="text" id="reg-username" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" name="password" placeholder="请输入密码" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">邮箱</label>
                    <input type="email" id="reg-email" name="email" placeholder="请输入邮箱" required>
                </div>

                <div class="form-group">
                    <label for="reg-status">状态</label>
                    <select id="reg-status" name="status" required>
                        <option value="active">活跃</option>
                        <option value="inactive">非活跃</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reg-role">角色</label>
                    <select id="reg-role" name="role" required>
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reg-description">描述</label>
                    <textarea id="reg-description" name="description" placeholder="请输入描述" rows="3"></textarea>
                </div>

                <div th:if="${registerError != null}" class="error-message">
                    <p th:text="${registerError}"></p>
                </div>

                <button type="submit" class="btn-submit">注 册</button>
            </form>
        </div>

        <div class="system-info">
            <p>ℹ️ <strong>系统信息：</strong>本系统用于管理和发布文章内容，支持用户权限管理和内容编辑。</p>
        </div>

        <script>
            document.getElementById('register-link').addEventListener('click', function(e) {
                e.preventDefault();
                var registerForm = document.getElementById('register-form');
                if (registerForm.style.display === 'none') {
                    registerForm.style.display = 'block';
                    this.textContent = '取消注册';
                } else {
                    registerForm.style.display = 'none';
                    this.textContent = '立即注册';
                }
            });
        </script>
    </div>
</body>

</html>
